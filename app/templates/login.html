{% extends "base.html" %}
{% block content %}
<div style="max-width: 400px; margin: 50px auto; background: white; padding: 30px; border-radius: 10px;">
    <h2 style="text-align: center;">Iniciar Sesión</h2>
    <form method="POST">
        <div style="margin-bottom: 15px;">
            <label>Email</label>
            <input type="email" name="email" style="width: 100%; padding: 8px;" required>
        </div>
        <div style="margin-bottom: 15px;">
            <label>Contraseña</label>
            <input type="password" name="password" style="width: 100%; padding: 8px;" required>
        </div>
        <button type="submit" class="btn" style="width: 100%;">Ingresar</button>
    </form>
    <p style="text-align: center; margin-top: 20px;">admin@nup.cl / admin123</p>
</div>
{% endblock %}
