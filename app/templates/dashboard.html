{% extends "base.html" %}
{% block content %}
<h2>Bienvenido, {{ usuario.user_nombre }}</h2>
<p>Rol: {{ usuario.user_rol }}</p>
<div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 30px;">
    <div style="background: white; padding: 20px; border-radius: 8px; text-align: center;">
        <h3>📦 Inventario</h3>
        <a href="{{ url_for('inventario') }}" style="background: #E67E22; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; display: inline-block;">Ver stock</a>
    </div>
    <div style="background: white; padding: 20px; border-radius: 8px; text-align: center;">
        <h3>🔄 Movimientos</h3>
        <a href="#" style="background: #E67E22; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; display: inline-block;">Registrar</a>
    </div>
</div>
{% endblock %}
